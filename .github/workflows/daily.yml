name: Daily job scan

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC ≈ 07:00/08:00 German time
  workflow_dispatch: {}     # manual trigger for testing

permissions:
  contents: write           # to persist data/seen.json

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          MAX_LLM_CALLS: ${{ vars.MAX_LLM_CALLS || '25' }}
        run: python -m src.main

      - name: Persist seen jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          git diff --cached --quiet || (git commit -m "chore: update seen jobs [skip ci]" && git push)
